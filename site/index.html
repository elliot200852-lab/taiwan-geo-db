<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>認識臺灣 — 人文與自然地理資料庫</title>
  <meta name="description" content="教師備課用的臺灣地理資料庫：互動地圖導航，每區以人文地理／自然地理雙區塊呈現。">
  <link rel="stylesheet" href="vendor/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-head">
    <h1>認識臺灣</h1>
    <p>人文與自然地理資料庫 · 教師備課用</p>
    <p>從地圖選一個地方，讀它的自然地理、人文地理，與可直接帶進課堂的教學素材。</p>
  </header>

  <nav class="crumbs" id="crumbs"><strong>臺灣</strong></nav>

  <p class="taiwan-intro"><a class="intro-cta" href="pages/taiwan.html">📖 先讀臺灣概論——地形、氣候、人口、22 縣市總覽</a></p>

  <div class="map-wrap">
    <div id="map"></div>
  </div>

  <div class="quick-nav">
    <button type="button" class="nav-chip" data-county="宜蘭縣">宜蘭縣（看 12 鄉鎮）</button>
    <button type="button" class="nav-chip" data-county="台北市">臺北市</button>
    <button type="button" class="nav-chip" data-county="新北市">新北市</button>
    <button type="button" class="nav-chip" data-county="基隆市">基隆市</button>
    <button type="button" class="nav-chip" data-county="桃園市">桃園市</button>
    <button type="button" class="nav-chip" data-county="新竹市">新竹市</button>
    <button type="button" class="nav-chip" data-county="新竹縣">新竹縣</button>
    <button type="button" class="nav-chip" data-county="苗栗縣">苗栗縣</button>
    <button type="button" class="nav-chip" data-county="台中市">臺中市</button>
    <button type="button" class="nav-chip" data-county="彰化縣">彰化縣</button>
    <button type="button" class="nav-chip" data-county="南投縣">南投縣</button>
    <button type="button" class="nav-chip" data-county="雲林縣">雲林縣</button>
    <button type="button" class="nav-chip" data-county="嘉義市">嘉義市</button>
    <button type="button" class="nav-chip" data-county="嘉義縣">嘉義縣</button>
    <button type="button" class="nav-chip" data-county="台南市">臺南市</button>
    <button type="button" class="nav-chip" data-county="高雄市">高雄市</button>
    <button type="button" class="nav-chip" data-county="屏東縣">屏東縣</button>
    <button type="button" class="nav-chip" data-county="台東縣">臺東縣</button>
    <button type="button" class="nav-chip" data-county="花蓮縣">花蓮縣</button>
    <button type="button" class="nav-chip" data-county="澎湖縣">澎湖縣</button>
    <button type="button" class="nav-chip" data-county="金門縣">金門縣</button>
    <button type="button" class="nav-chip" data-county="連江縣">連江縣（馬祖）</button>
  </div>

  <p class="map-hint">臺灣 22 縣市內容已全數上線；宜蘭縣可點入看 12 鄉鎮市。地圖上找不到小島（金門／連江／澎湖）可直接點上方快速導覽。</p>

  <section class="themes-section" id="themes">
    <h2>主題地理</h2>
    <p class="themes-lead">除了一個地方一個地方地看，也可以拉一條線索橫看整座島——同一個地理元素，在全臺灣長成什麼樣子。</p>
    <div class="themes-cats" id="themes-cats"></div>
  </section>

  <script src="vendor/leaflet.js"></script>
  <script src="js/map.js"></script>
  <script>
    // 主題入口：兩大類固定顯示（骨架用學名、溫度放副標），主題卡片由 themes-index.json 動態長出。
    (function () {
      var CATS = [
        { layer: '自然地理', sub: '島的身世' },
        { layer: '人文地理', sub: '人的足跡' }
      ];
      var host = document.getElementById('themes-cats');
      if (!host) return;
      fetch('data/themes-index.json')
        .then(function (r) { return r.json(); })
        .catch(function () { return { themes: [] }; })
        .then(function (data) {
          var themes = (data && data.themes) || [];
          CATS.forEach(function (cat) {
            var mine = themes.filter(function (t) { return t.layer === cat.layer; });
            var groups = {};
            mine.forEach(function (t) {
              var g = t.theme_group || '其他';
              (groups[g] = groups[g] || []).push(t);
            });
            var col = document.createElement('div');
            col.className = 'themes-cat';
            var head = '<div class="tc-head"><span class="tc-layer">' + cat.layer +
              '</span><span class="tc-sub">' + cat.sub + '</span></div>';
            var bodyHtml = '';
            if (!mine.length) {
              bodyHtml = '<p class="tc-empty">主題陸續上線中</p>';
            } else {
              Object.keys(groups).forEach(function (g) {
                bodyHtml += '<div class="tc-group"><div class="tc-group-name">' + g + '</div>';
                groups[g].forEach(function (t) {
                  bodyHtml += '<a class="tc-theme" href="pages/' + t.id + '.html">' + t.name + '</a>';
                });
                bodyHtml += '</div>';
              });
            }
            col.innerHTML = head + bodyHtml;
            host.appendChild(col);
          });
        });
    })();
  </script>
</body>
</html>
