# taiwan-geo-db 視覺改版 v1 — 54 張情境 hero 圖 prompt 清單
#
# SSOT：docs/DESIGN-SPEC.md 第 6 節。
# 這裡每一條只是「主體描述」（英文，供生圖），不含風格詞、不含「no text」等要求——
# 風格前綴（鋼筆淡彩、大地色、no text 等）由 scripts/gen_hero_images.py 統一加在前面。
